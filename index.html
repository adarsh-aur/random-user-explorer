<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random User Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Random User Explorer</h1>

    <button id="theme-toggle">
      Toggle Dark Mode
    </button>

    <button id="fetch-btn">
      Fetch User
    </button>

    <button id="retry-btn">
      Retry
    </button>

    <button id="fav" onclick="showFavourites()">Show Favourites</button>

    <input class="input-text" type="text" placeholder="Search User">

    <p id="loading"></p>
    <p id="error"></p>

    <div id="user-card"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
